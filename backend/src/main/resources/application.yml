server:
  port: ${OIDC_PORT:8800}

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:54322}/keycloak
    username: ${DB_USERNAME:keycloak}
    password: ${DB_PASSWORD:passw0rd}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false
  thymeleaf:
    cache: false
    prefix: classpath:/templates/

oidc:
  issuer: ${OIDC_ISSUER:http://oidc.outline.xyz:10087}
  # JWT signing key (at least 256 bits for HS256, generate with: openssl rand -hex 32)
  jwt-secret: ${OIDC_JWT_SECRET:a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2}
  # Auth code TTL (seconds)
  code-ttl: 300
  # Access token TTL (seconds)
  access-token-ttl: 300
  # Refresh token TTL (seconds)
  refresh-token-ttl: 86400
  # Login page customization
  login-theme:
    background-image: ${OIDC_LOGIN_BG:}
    background-color: ${OIDC_LOGIN_BG_COLOR:#f0f2f5}
    logo-url: ${OIDC_LOGIN_LOGO:}
    title: ${OIDC_LOGIN_TITLE:SSO Login}
    primary-color: ${OIDC_LOGIN_PRIMARY_COLOR:#1890ff}
    auto-login-enabled: ${OIDC_LOGIN_AUTO_LOGIN_ENABLED:true}
